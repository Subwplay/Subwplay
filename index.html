<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subwplay — Bio</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: rgba(255,255,255,0.07);
      --accent: #b8ff57;
      --accent2: #57d4ff;
      --accent3: #ff57b8;
      --text: #f0f0f0;
      --muted: #666;
      --card: rgba(255,255,255,0.04);
      --card-hover: rgba(255,255,255,0.08);
    }

    /* Hide default cursor on desktop */
    @media (hover: hover) {
      *, html, body { cursor: none !important; }
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    #cursor-dot {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 10px var(--accent), 0 0 22px var(--accent);
      transition: width .15s, height .15s, background .2s, box-shadow .2s;
      mix-blend-mode: screen;
      will-change: left, top;
    }
    #cursor-ring {
      position: fixed;
      width: 38px; height: 38px;
      border: 1.5px solid rgba(184,255,87,.45);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99998;
      transform: translate(-50%,-50%);
      transition: width .3s cubic-bezier(.22,1,.36,1),
                  height .3s cubic-bezier(.22,1,.36,1),
                  border-color .25s;
      will-change: left, top;
    }
    body.c-hover #cursor-dot  { width:16px; height:16px; background:var(--accent2); box-shadow:0 0 16px var(--accent2),0 0 36px var(--accent2); }
    body.c-hover #cursor-ring { width:58px; height:58px; border-color:rgba(87,212,255,.5); }
    body.c-click #cursor-dot  { width:6px; height:6px; }
    body.c-click #cursor-ring { width:22px; height:22px; border-color:var(--accent3); }

    .c-particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 99990;
      transform: translate(-50%,-50%) scale(1);
      animation: pfade var(--dur,.7s) ease-out forwards;
    }
    @keyframes pfade {
      0%   { opacity:.85; transform:translate(-50%,-50%) scale(1); }
      100% { opacity:0;   transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0); }
    }

    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
      background-size:48px 48px;
      z-index:0; pointer-events:none;
    }

    .blob {
      position:fixed; border-radius:50%;
      filter:blur(100px); opacity:.12;
      pointer-events:none; z-index:0;
      animation:drift 18s ease-in-out infinite;
      will-change:transform;
    }
    .blob-1{width:500px;height:500px;background:var(--accent);top:-150px;left:-150px;animation-delay:0s}
    .blob-2{width:400px;height:400px;background:var(--accent2);bottom:-100px;right:-100px;animation-delay:-9s}
    .blob-3{width:300px;height:300px;background:var(--accent3);top:50%;left:60%;animation-delay:-4s}
    @keyframes drift{
      0%,100%{transform:translate(0,0) scale(1)}
      33%{transform:translate(30px,-30px) scale(1.05)}
      66%{transform:translate(-20px,20px) scale(.95)}
    }

    .page{
      position:relative; z-index:1;
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:60px 20px;
    }
    .card{
      width:100%; max-width:520px;
      display:flex; flex-direction:column; align-items:center;
      gap:32px;
    }

    .avatar-wrap{
      position:relative;
      width:130px; height:130px;
      animation:fadeDown .8s cubic-bezier(.22,1,.36,1) both;
      perspective:600px;
    }
    .avatar-ring{
      position:absolute; inset:-7px;
      border-radius:50%;
      background:conic-gradient(var(--accent),var(--accent2),var(--accent3),var(--accent));
      animation:spin 5s linear infinite;
    }
    .avatar-ring-mask{
      position:absolute; inset:3px;
      border-radius:50%; background:var(--bg);
    }
    .avatar{
      position:absolute; inset:7px;
      border-radius:50%; background:var(--surface);
      overflow:hidden;
      transition:transform .35s cubic-bezier(.22,1,.36,1);
    }

    .avatar img{
      width:100%; height:100%;
      object-fit:cover; border-radius:50%; display:block;
    }
    .avatar-fallback{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; font-size:40px; font-weight:800;
      color:var(--accent);
    }
    .avatar-wrap:hover .avatar{transform:scale(1.07) rotate3d(.3,1,0,8deg);}
    .avatar-wrap:hover .avatar-ring{animation:spin 2s linear infinite;}

    /* Green online dot */
    .online-dot{
      position:absolute; bottom:5px; right:5px;
      width:18px; height:18px;
      background:#22c55e; border-radius:50%;
      border:3px solid var(--bg);
      box-shadow:0 0 8px #22c55e;
      animation:blink 2s ease-in-out infinite;
      z-index:2;
    }
    @keyframes blink{0%,100%{box-shadow:0 0 8px #22c55e}50%{box-shadow:0 0 20px #22c55e,0 0 36px #22c55e44}}
    @keyframes spin{to{transform:rotate(360deg)}}

    .identity{text-align:center;animation:fadeDown .8s .1s cubic-bezier(.22,1,.36,1) both;}
    .name{
      font-family:'Syne',sans-serif;
      font-size:clamp(28px,6vw,42px); font-weight:800;
      letter-spacing:-1.5px; line-height:1; margin-bottom:8px;
    }
    .name .accent{color:var(--accent);}
    .handle{color:var(--muted);font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
    .bio-text{color:rgba(240,240,240,.65);font-size:14px;line-height:1.75;max-width:380px;margin:0 auto;}

    .tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;animation:fadeDown .8s .2s cubic-bezier(.22,1,.36,1) both;}
    .tag{
      padding:5px 13px; border-radius:20px;
      font-size:11px; letter-spacing:1px; text-transform:uppercase;
      border:1px solid var(--border); background:var(--card); color:var(--muted);
      transition:border-color .2s,color .2s;
    }
    .tag:hover{border-color:var(--accent);color:var(--accent);}

    .divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);}
    .section-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);align-self:flex-start;padding-left:2px;}

    .socials{
      width:100%; display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
      animation:fadeUp .8s .3s cubic-bezier(.22,1,.36,1) both;
    }
    .social-btn{
      display:flex; flex-direction:column; align-items:center; gap:8px;
      padding:18px 10px; border-radius:16px;
      border:1px solid var(--border); background:var(--card);
      text-decoration:none; color:var(--text);
      transition:all .25s cubic-bezier(.22,1,.36,1);
      position:relative; overflow:hidden;
      font-family:'DM Mono',monospace;
    }
    .social-btn::before{content:'';position:absolute;inset:0;background:var(--btn-color,var(--accent));opacity:0;transition:opacity .25s;}
    .social-btn:hover::before{opacity:.09;}
    .social-btn:hover{
      border-color:var(--btn-color,var(--accent));
      transform:translateY(-5px) scale(1.04);
      box-shadow:0 14px 40px -10px var(--btn-color,transparent);
    }
    .social-btn svg{width:26px;height:26px;position:relative;z-index:1;fill:var(--btn-color,var(--text));transition:transform .25s;}
    .social-btn:hover svg{transform:scale(1.18) rotate(-4deg);}
    .social-btn span{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);position:relative;z-index:1;transition:color .25s;}
    .social-btn:hover span{color:var(--btn-color,var(--text));}

    .links{width:100%;display:flex;flex-direction:column;gap:10px;animation:fadeUp .8s .45s cubic-bezier(.22,1,.36,1) both;}
    .link-btn{
      display:flex; align-items:center; gap:14px;
      padding:16px 20px; border-radius:14px;
      border:1px solid var(--border); background:var(--card);
      text-decoration:none; color:var(--text);
      transition:all .25s cubic-bezier(.22,1,.36,1);
      font-family:'DM Mono',monospace; position:relative; overflow:hidden;
    }
    .link-btn::after{content:'→';margin-left:auto;color:var(--muted);font-size:16px;transition:transform .25s,color .25s;}
    .link-btn:hover{border-color:var(--btn-color,var(--accent));background:var(--card-hover);transform:translateX(5px);}
    .link-btn:hover::after{transform:translateX(5px);color:var(--btn-color,var(--accent));}
    .link-btn .link-icon{
      width:38px;height:38px;border-radius:10px;
      background:rgba(255,255,255,.06);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      transition:background .2s;
    }
    .link-btn:hover .link-icon{background:rgba(255,255,255,.12);}
    .link-btn .link-icon svg{width:18px;height:18px;fill:var(--btn-color,var(--text));}
    .link-btn .link-info{display:flex;flex-direction:column;gap:2px;}
    .link-btn .link-title{font-size:13px;font-weight:500;}
    .link-btn .link-sub{font-size:11px;color:var(--muted);}

    .footer{
      font-size:11px;color:var(--muted);letter-spacing:1px;
      animation:fadeUp .8s .6s cubic-bezier(.22,1,.36,1) both;
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;
    }

    @keyframes fadeDown{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp  {from{opacity:0;transform:translateY( 24px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:420px){
      .socials{gap:8px;}
      .social-btn{padding:13px 5px;}
      .social-btn svg{width:20px;height:20px;}
    }
  </style>
</head>
<body>

<script>

const dot  = document.getElementById('cursor-dot');
const ring = document.getElementById('cursor-ring');
const COLS = ['#b8ff57','#57d4ff','#ff57b8','#ffe557','#ff8c57'];

let mx=window.innerWidth/2, my=window.innerHeight/2;
let rx=mx, ry=my;
let lastP=0;

function spawnParticle(x,y,burst=false){
  const count = burst ? 8 : 1;
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'c-particle';
    const sz  = burst ? 5+Math.random()*8 : 3+Math.random()*5;
    const ang = burst ? (i/count)*Math.PI*2 + Math.random()*.5 : Math.random()*Math.PI*2;
    const dist= burst ? 30+Math.random()*50 : 15+Math.random()*28;
    const col = COLS[Math.floor(Math.random()*COLS.length)];
    const dur = (burst ? .5+Math.random()*.4 : .4+Math.random()*.35).toFixed(2);
    p.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${col};box-shadow:0 0 ${sz*2}px ${col};--dx:${(Math.cos(ang)*dist).toFixed(1)}px;--dy:${(Math.sin(ang)*dist).toFixed(1)}px;--dur:${dur}s;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), dur*1000+100);
  }
}

document.addEventListener('mousemove', e=>{
  mx=e.clientX; my=e.clientY;
  dot.style.left=mx+'px'; dot.style.top=my+'px';
  const now=Date.now();
  if(now-lastP>45){ spawnParticle(mx,my); lastP=now; }
  // blob parallax
  const px=(mx/innerWidth-.5)*30, py=(my/innerHeight-.5)*30;
  document.querySelectorAll('.blob').forEach((b,i)=>{
    const f=(i+1)*.6;
    b.style.transform=`translate(${px*f}px,${py*f}px)`;
  });
});

(function loop(){
  rx+=(mx-rx)*.12; ry+=(my-ry)*.12;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(loop);
})();

// Hover state
document.querySelectorAll('a,button,.tag,.avatar-wrap').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('c-hover'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('c-hover'));
});
// Click burst
document.addEventListener('mousedown',()=>{ document.body.classList.add('c-click'); spawnParticle(mx,my,true); });
document.addEventListener('mouseup',  ()=>  document.body.classList.remove('c-click'));

document.querySelectorAll('.social-btn,.link-btn').forEach(btn=>{
  btn.addEventListener('click',function(e){
    const r=document.createElement('span');
    const rc=this.getBoundingClientRect();
    const sz=Math.max(rc.width,rc.height)*2;
    r.style.cssText=`position:absolute;border-radius:50%;pointer-events:none;width:${sz}px;height:${sz}px;left:${e.clientX-rc.left-sz/2}px;top:${e.clientY-rc.top-sz/2}px;background:var(--btn-color,white);opacity:.15;transform:scale(0);animation:ripple .55s ease-out forwards;`;
    this.appendChild(r);
    setTimeout(()=>r.remove(),600);
  });
});
const rs=document.createElement('style');
rs.textContent='@keyframes ripple{to{transform:scale(1);opacity:0}}';
document.head.appendChild(rs);


</script>
</body>
