<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subwplay.info</title>
    <style>
        @import url('https://googleapis.com');

        :root { --bg-x: 50%; --bg-y: 50%; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at var(--bg-x) var(--bg-y), #0077b6 0%, #023e8a 100%);
            background-color: #023e8a;
            touch-action: none;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 9999; pointer-events: none; }

.footer-text {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.4;
    margin-top: 10px;
    font-weight: 500;
}

        .ui-layer {
            position: relative; z-index: 10; height: 100%;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            color: white;
            width: 85%;
            max-width: 320px;
            pointer-events: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .avatar {
            width: 90px; height: 90px; border-radius: 50%;
            background: rgba(255,255,255,0.1); margin: 0 auto 15px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            object-fit: cover; display: block;
        }

        h2 { margin: 10px 0 5px; font-size: 20px; font-weight: 700; }
        .sub-text { opacity: 0.7; font-size: 13px; font-weight: 300; margin-bottom: 12px; }
        .divider { height: 1px; background: rgba(255, 255, 255, 0.15); margin: 15px 0; }
        
        .btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-wrapper a { text-decoration: none; display: inline-block; }
        
        button {
            padding: 12px 25px; 
            border: none; 
            border-radius: 12px;
            color: white;
            font-size: 13px; 
            font-weight: 700; 
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* ЦВЕТА БРЕНДОВ */
        .btn-tg { background: rgba(36, 161, 222, 0.4); border: 1px solid #24a1de; }
        .btn-vk { background: rgba(0, 119, 255, 0.4); border: 1px solid #0077ff; }
        .btn-yt { background: rgba(255, 0, 0, 0.4); border: 1px solid #ff0000; }
        .btn-tv { background: rgba(100, 65, 164, 0.4); border: 1px solid #6441A4; }
        .btn-bt { background: rgba(255, 129, 63, 0.4); border: 1px solid #FF8C00; }
        .btn-da { background: rgb(255, 165, 0.4); border: 1px solid #ff8100; }
        .btn-dp { background: rgba(0, 100, 0, 0.4); border: 1px solid #006400; }
        .btn-default { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.2); }

        #success-tick {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 70px; height: 70px;
            background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            z-index: 100; pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #success-tick.show { transform: translate(-50%, -50%) scale(1); }
        .tick-icon {
            width: 14px; height: 28px;
            border-bottom: 5px solid #0077b6; border-right: 5px solid #0077b6;
            transform: rotate(45deg); margin-top: -6px;
        }

        @media (pointer: fine) { body { cursor: none; } }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="success-tick"><div class="tick-icon"></div></div>

    <div class="ui-layer">
        <div class="card">
            <img src="https://yt3.ggpht.com/OWop4xyCsGjEYCiGFEvqO1xcnpXFWXw6ETHIk1-Tse1bxPvw9OulR1JJnbSS6WGdXFpFU7hP5OE=s88-c-k-c0x00ffffff-no-rj" alt="Avatar" class="avatar">
            <h2>Subwplay</h2>
            <p class="sub-text">Начинающий видеоблогер, стример и т.д.</p>
            
            <div class="divider"></div>

            <p class="sub-text">Социальные сети</p>
            <div class="btn-wrapper">
                <a href="https://t.me/subwplay" target="_blank"><button class="btn-tg" onclick="showOk()">Telegram</button></a>
                <a href="https://www.youtube.com/@subwplay" target="_blank"><button class="btn-yt" onclick="showOk()">Youtube</button></a>
                <a href="https://www.twitch.tv/subwplay" target="_blank"><button class="btn-tv" onclick="showOk()">Twitch</button></a>
            </div>

            <div class="divider"></div>

            <p class="sub-text">Пожертвование</p>
            <div class="btn-wrapper">
                <a href="https://www.donationalerts.com/r/subwplay" target="_blank"><button class="btn-da" onclick="showOk()">Donation Alerts</button></a>
                <a href="https://donatepay.ru/don/Subwplay" target="_blank"><button class="btn-dp" onclick="showOk()">Donate Pay</button></a>
            </div>

            <div class="divider"></div>

            <p class="sub-text">Контакты</p>
            <div class="btn-wrapper">
                <button class="btn-default" onclick="copyEmail('no email provided.')">Email</button>
            </div>

             <div class="divider"></div>
             <p class="footer-text">© 2026 • Все права защищены</p>
        </div>
    </div>

    <script>
        function showOk() {
            const tick = document.getElementById('success-tick');
            tick.classList.add('show');
            setTimeout(() => tick.classList.remove('show'), 1500);
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, mouse = { x: -200, y: -200, down: false }, dots = [];
        let currentScale = 1;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        for (let i = 0; i < 16; i++) dots.push({ x: width/2, y: height/2 });

        const updatePos = (e) => {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            mouse.x = clientX; mouse.y = clientY;
            const xShift = 50 + (clientX / window.innerWidth - 0.5) * 15;
            const yShift = 50 + (clientY / window.innerHeight - 0.5) * 15;
            document.documentElement.style.setProperty('--bg-x', `${xShift}%`);
            document.documentElement.style.setProperty('--bg-y', `${yShift}%`);
        };

        window.addEventListener('mousemove', updatePos);
        window.addEventListener('touchmove', (e) => updatePos(e), { passive: true });
        window.addEventListener('mousedown', () => mouse.down = true);
        window.addEventListener('mouseup', () => mouse.down = false);
        window.addEventListener('touchstart', (e) => { updatePos(e); mouse.down = true; }, { passive: true });
        window.addEventListener('touchend', () => mouse.down = false);

        function animate() {
            ctx.clearRect(0, 0, width, height);
            currentScale += ((mouse.down ? 0.6 : 1) - currentScale) * 0.12;
            dots[0].x += (mouse.x - dots[0].x) * 0.15;
            dots[0].y += (mouse.y - dots[0].y) * 0.15;
            for (let i = 1; i < 16; i++) {
                dots[i].x += (dots[i-1].x - dots[i].x) * 0.35;
                dots[i].y += (dots[i-1].y - dots[i].y) * 0.35;
            }
            dots.forEach((dot, i) => {
                const r = (11 * (1 - i/16)) * currentScale;
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, Math.max(0, r), 0, Math.PI * 2);
                if (i === 0) {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${currentScale * 0.8})`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                } else {
                    ctx.fillStyle = `rgba(255, 255, 255, ${(1 - i/16) * 0.25})`;
                    ctx.fill();
                }
            });
            requestAnimationFrame(animate);
        }
        animate();

function copyEmail(email) {
    navigator.clipboard.writeText(email).then(() => {
        showOk();
        console.log('Почта скопирована: ' + email);
    }).catch(err => {
        console.error('Ошибка при копировании: ', err);
    });
}
    </script>
</body>
</html>
